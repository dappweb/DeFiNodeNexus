# /etc/nginx/sites-available/definode
# Symlink to enable: sudo ln -s /etc/nginx/sites-available/definode /etc/nginx/sites-enabled/definode

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS (uncomment after certbot setup)
    # return 301 https://$host$request_uri;

    # ── Static assets served by nginx directly (high performance) ──────────
    location /_next/static/ {
        alias /home/ubuntu/DeFiNodeNexus/.next/standalone/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /public/ {
        alias /home/ubuntu/DeFiNodeNexus/.next/standalone/public/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Proxy all other requests to Next.js standalone server ──────────────
    location / {
        proxy_pass         http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering    off;
        proxy_hide_header  Cache-Control;
        proxy_hide_header  Expires;
        proxy_hide_header  Pragma;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}

