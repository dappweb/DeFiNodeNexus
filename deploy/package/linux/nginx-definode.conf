# /etc/nginx/sites-available/definode (or /etc/openresty/conf.d/definodexus.conf)
# Managed by deploy.sh — edits here are synced on every deploy.
#
# Domain  : t1.test2dapp.xyz
# SSL     : Cloudflare Flexible/Full (CF handles HTTPS termination)
#           For end-to-end LE certs, pause CF proxy and run:
#             sudo certbot certonly --standalone -d t1.test2dapp.xyz

server {
    listen 80;
    server_name t1.test2dapp.xyz;

    # Static assets served by nginx directly (high performance)
    location /_next/static/ {
        try_files /home/ubuntu/DeFiNodeNexus/.next/standalone/.next/static$uri /home/ubuntu/DeFiNodeNexus/.next/static$uri @next_static_upstream;
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        access_log off;
    }

    location @next_static_upstream {
        proxy_pass         http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /public/ {
        alias /home/ubuntu/DeFiNodeNexus/.next/standalone/public/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Proxy all other requests to Next.js standalone server
    location / {
        proxy_pass         http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering    off;
        proxy_hide_header  Cache-Control;
        proxy_hide_header  Expires;
        proxy_hide_header  Pragma;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}

# HTTPS is terminated directly by OpenResty for this host so Cloudflare Full/Strict
# does not fall through to another TLS vhost.
server {
    listen 443 ssl;
    http2 on;
    server_name t1.test2dapp.xyz;

    ssl_certificate     /etc/openresty/conf.d/certs/test2dapp.xyz.crt;
    ssl_certificate_key /etc/openresty/conf.d/certs/test2dapp.xyz.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /_next/static/ {
        try_files /home/ubuntu/DeFiNodeNexus/.next/standalone/.next/static$uri /home/ubuntu/DeFiNodeNexus/.next/static$uri @next_static_upstream_tls;
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        access_log off;
    }

    location @next_static_upstream_tls {
        proxy_pass         http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /public/ {
        alias /home/ubuntu/DeFiNodeNexus/.next/standalone/public/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        proxy_pass         http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering    off;
        proxy_hide_header  Cache-Control;
        proxy_hide_header  Expires;
        proxy_hide_header  Pragma;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
